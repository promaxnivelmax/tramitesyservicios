<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tramites y Servicios - Barrancabermeja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              tyYellow: '#ffc123',
              tyGrey: '#333333',
              tyLightGrey: '#f3f4f6',
              // Female template colors
              tyLilac: '#e879f9', // Fuchsia 400
              tyPurple: '#a21caf', // Fuchsia 700
              tySoftPink: '#fdf4ff', // Fuchsia 50
              // Neutral (Green) template colors
              tyGreen: '#059669', // Emerald 600
              tyDarkGreen: '#064e3b', // Emerald 900
              tyMint: '#ecfdf5', // Emerald 50
            },
            fontFamily: {
              sans: ['Open Sans', 'sans-serif'],
              heading: ['Montserrat', 'sans-serif'],
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'slide-up': 'slideUp 0.5s ease-out',
              'pop': 'pop 0.3s ease-out',
            }
          }
        }
      }
    </script>
    <style>
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
        100% { transform: translateY(0px); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pop {
        0% { transform: scale(0.9); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-float { animation: float 6s ease-in-out infinite; }
      .animate-slide-up { animation: slideUp 0.6s ease-out forwards; }
      .animate-pop { animation: pop 0.4s ease-out forwards; }
      
      @media print {
        @page { margin: 0; }
        body { -webkit-print-color-adjust: exact; }
        .no-print { display: none !important; }
        .print-area { display: block !important; width: 100%; height: 100%; }
      }
    </style>
